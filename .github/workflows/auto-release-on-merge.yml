name: Auto-release on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  actions: write

jobs:
  dispatch-release:
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: v
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          test -n "$LATEST" || { echo "no v<semver> tag found"; exit 1; }
          NEXT=$(echo "${LATEST#v}" | awk -F. '{print $1"."$2"."$3+1}')
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "dispatching release for $NEXT"

      - name: Dispatch Release Wave
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: gh workflow run release-wave.yml -r main -F version=${{ steps.v.outputs.version }}
