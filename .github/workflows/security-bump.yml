name: Security Bump

on:
  schedule:
    - cron: "0 9 * * *" # Every day at 09:00 UTC.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  security-bump:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - uses: actions/setup-python@v6

      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.70.0

      - name: Install browser host deps (Noble names)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libgtk-3-0t64 \
            libnss3 libnspr4 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libxshmfence1 \
            libpango-1.0-0 libcairo2 libdbus-glib-1-2 libxt6

      - name: Tmp e2e test
        run: |
          make setup-ui
          make build-ui
          make setup-e2e
          make test-e2e-ci

      - name: Run security bump
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_USER_NAME: wave-bot
          GIT_USER_EMAIL: wave-bot@h2o.ai
        run: make security-bump
